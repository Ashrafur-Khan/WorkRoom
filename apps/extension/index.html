<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorkRoom</title>
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <h1>WorkRoom</h1>

    <div id="view-idle">
      <label for="goal-input">Goal</label>
      <textarea id="goal-input" rows="2" placeholder="Work on econ homework"></textarea>

      <label for="duration-input">Duration (minutes)</label>
      <input id="duration-input" type="number" value="25" min="1" max="180" />

      <p class="info-text">Set your focus goal and start a session.</p>
      <button id="start-btn" disabled>Start session</button>
    </div>

    <div id="view-running" class="hidden">
      <p class="session-header">Current session</p>
      
      <p id="display-goal" class="display-text"></p>
      <p id="display-endtime" class="display-text"></p>

      <p class="note-text">Timers and stats are coming soon.</p>
      <button id="stop-btn">End session</button>
    </div>

    <script type="module" src="./popup.ts"></script>
  </body>
</html>
